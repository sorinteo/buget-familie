<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buget Familie</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #121212; 
            padding: 20px; 
            color: #e0e0e0; 
        }
        .container { 
            max-width: 1100px; 
            margin: auto; 
            background: #1e1e1e; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); 
        }
        h1, h2, h3 { color: #ffffff; }
        .dashboard { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        .card { 
            flex: 1; 
            padding: 20px; 
            border-radius: 8px; 
            text-align: center; 
            font-size: 1.3em; 
            font-weight: bold; 
            color: white; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .bg-total { background-color: #2c3e50; }
        .bg-paid { background-color: #1e8449; }
        .bg-remaining { background-color: #c0392b; }
        
        .form-group { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
            align-items: center; 
        }
        .filter-panel {
            background-color: #252525;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        input, select { 
            padding: 10px; 
            border: 1px solid #444; 
            border-radius: 6px; 
            font-size: 1em; 
            background-color: #2c2c2c; 
            color: #ffffff; 
        }
        button { 
            padding: 10px 15px;
            background-color: #2980b9; 
            color: white; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #2471a3; }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-bottom: 30px; 
        }
        th, td { 
            padding: 12px; 
            border-bottom: 1px solid #444; 
            text-align: left; 
        }
        th { background-color: #2a2a2a; color: #ffffff; }
        .chart-container { margin-top: 40px; }
        
        .checkbox-container { display: flex; align-items: center; gap: 5px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; }
        .btn-logout { background-color: #7f8c8d; }
        .btn-logout:hover { background-color: #636e72; }
        
        ::placeholder { color: #777; }
    </style>
</head>
<body>

<div id="loginSection" class="container" style="max-width: 400px; margin-top: 100px;">
    <h2>Autentificare</h2>
    <form id="loginForm" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="email" id="email" placeholder="Adresa de email" required>
        <input type="password" id="password" placeholder="Parola" required>
        <button type="submit">Intră în cont</button>
    </form>
</div>

<div id="appSection" class="container" style="display: none;">
    <div class="header-bar">
        <h1>Management Cheltuieli Lunare</h1>
        <button class="btn-logout" onclick="logout()">Deconectare</button>
    </div>

    <div class="dashboard">
        <div class="card bg-total">
            Total lună selectată:<br>
            <span id="totalAmount">0.00</span>
        </div>
        <div class="card bg-paid">
            Plătit:<br>
            <span id="paidAmount">0.00</span>
        </div>
        <div class="card bg-remaining">
            Rest de plată:<br>
            <span id="remainingAmount">0.00</span>
        </div>
    </div>

    <h2 id="formTitle">Adaugă Cheltuială</h2>
    <form id="expenseForm">
        <div class="form-group">
            <input type="month" id="expenseMonth" required>
            <input type="text" id="merchant" placeholder="Comerciant" required>
            <select id="category">
                <option value="1">Cat 1 - Fixe constante</option>
                <option value="2">Cat 2 - Variabile</option>
                <option value="3">Cat 3 - Neprevăzute</option>
            </select>
            <input type="number" id="amount" placeholder="Sumă" step="0.01" required>
        </div>
        
        <div class="form-group" id="rateFields" style="display: flex;">
            <input type="number" id="currentRate" placeholder="Rata curentă" min="1" style="width: 140px;">
            <span style="color: white;">din</span>
            <input type="number" id="totalRates" placeholder="Total rate" min="1" style="width: 140px;">
        </div>

        <div class="form-group">
            <input type="text" id="comments" placeholder="Comentarii" style="flex-grow: 1;">
            <input type="file" id="fileUpload" accept="image/jpeg, image/png, application/pdf" style="flex-grow: 1;">
            <label class="checkbox-container">
                <input type="checkbox" id="isPaid"> Achitat acum
            </label>
            <button type="submit" id="saveBtn">Salvează</button>
            <button type="button" id="cancelEditBtn" style="display: none; background-color: #e67e22;" onclick="cancelEdit()">Anulează Editarea</button>
        </div>
    </form>

    <h2>Registru Cheltuieli</h2>
    
    <div class="filter-panel">
        <h3 style="margin-top: 0; font-size: 1.1em; color: #3498db;">🔍 Zone de Filtrare și Căutare Rapidă</h3>
        <div class="form-group" style="margin-bottom: 0;">
            <input type="text" id="filterSearch" placeholder="Caută comerciant sau comentarii..." style="width: 250px;">
            
            <select id="filterCategory">
                <option value="ALL">Toate Categoriile</option>
                <option value="1">Cat 1 - Fixe constante</option>
                <option value="2">Cat 2 - Variabile</option>
                <option value="3">Cat 3 - Neprevăzute</option>
            </select>
            
            <select id="filterStatus">
                <option value="ALL">Toate Statusurile</option>
                <option value="PAID">Doar Achitate (Da)</option>
                <option value="UNPAID">Doar Neachitate (Nu)</option>
            </select>
            
            <input type="number" id="filterMinAmount" placeholder="Suma minimă" step="0.01" style="width: 120px;">
            <input type="number" id="filterMaxAmount" placeholder="Suma maximă" step="0.01" style="width: 120px;">
            
            <select id="filterMonthScope">
                <option value="SELECTED">Doar luna selectată sus</option>
                <option value="ALL">Toate lunile din istoric</option>
            </select>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Luna</th>
                <th>Comerciant</th>
                <th>Categorie</th>
                <th>Sumă</th>
                <th style="max-width: 250px;">Comentarii</th>
                <th>Plătit</th>
                <th>Acțiuni</th>
            </tr>
        </thead>
        <tbody id="expenseTableBody"></tbody>
    </table>

    <div class="chart-container">
        <h2>Evoluție Grafică</h2>
        <div class="form-group">
            <label for="chartMonths">Număr de luni:</label>
            <input type="number" id="chartMonths" value="6" min="1" max="60" style="width: 80px;">
            <button type="button" onclick="updateChart()">Generează Grafic</button>
        </div>
        <canvas id="expenseChart"></canvas>
    </div>
</div>

<script>
    const supabaseUrl = 'https://qvfcsvhofkzcprxatnhu.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF2ZmNzdmhvZmt6Y3ByeGF0bmh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNzM3MDAsImV4cCI6MjA5Njg0OTcwMH0.zJRZvAHFKUhdrpuB3h1WiolbM6OlfaX_djCVKtPLXUc';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    
    let expenses = [];
    let expenseChartInstance = null;
    let editingExpenseId = null;
    let existingFileUrl = null;

    document.addEventListener('DOMContentLoaded', () => {
        checkSession();
        toggleRateFields();
        setupFilterListeners();
    });

    const catSelect = document.getElementById('category');
    const rateDiv = document.getElementById('rateFields');

    function toggleRateFields() {
        if(catSelect.value === '1') {
            rateDiv.style.display = 'flex';
        } else {
            rateDiv.style.display = 'none';
            document.getElementById('currentRate').value = '';
            document.getElementById('totalRates').value = '';
        }
    }

    catSelect.addEventListener('change', toggleRateFields);

    function setupFilterListeners() {
        document.getElementById('filterSearch').addEventListener('input', renderUI);
        document.getElementById('filterCategory').addEventListener('change', renderUI);
        document.getElementById('filterStatus').addEventListener('change', renderUI);
        document.getElementById('filterMinAmount').addEventListener('input', renderUI);
        document.getElementById('filterMaxAmount').addEventListener('input', renderUI);
        document.getElementById('filterMonthScope').addEventListener('change', renderUI);
    }

    async function checkSession() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            document.getElementById('expenseMonth').value = new Date().toISOString().slice(0, 7);
            fetchExpenses();
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email: email, password: password });
        
        if (error) {
            alert("Eroare la autentificare. Verifică datele introduse.");
        } else {
            checkSession();
        }
    });

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.reload();
    }

    async function fetchExpenses() {
        const { data, error } = await supabaseClient.from('cheltuieli').select('*').order('id', { ascending: false });
        if (!error && data) {
            expenses = data;
            renderUI();
        }
    }

    function getNextMonthStr(monthVal) {
        let parts = monthVal.split('-');
        let year = parseInt(parts[0]);
        let month = parseInt(parts[1]);
        
        month++;
        if (month > 12) {
            month = 1;
            year++;
        }
        
        let monthStr = month < 10 ? '0' + month : month;
        return year + '-' + monthStr;
    }

    async function handleNextRateRollover(exp) {
        if (exp.category === '1' && exp.current_rate && exp.total_rates && exp.current_rate < exp.total_rates) {
            const nextMonth = getNextMonthStr(exp.month_val);
            
            const { data: existing, error } = await supabaseClient.from('cheltuieli')
                .select('id')
                .eq('month_val', nextMonth)
                .eq('merchant', exp.merchant)
                .eq('current_rate', exp.current_rate + 1);
                
            if (!error && (!existing || existing.length === 0)) {
                const nextExp = {
                    month_val: nextMonth,
                    merchant: exp.merchant,
                    category: exp.category,
                    amount: exp.amount,
                    comments: exp.comments || '',
                    is_paid: false,
                    current_rate: exp.current_rate + 1,
                    total_rates: exp.total_rates,
                    file_url: null 
                };
                await supabaseClient.from('cheltuieli').insert([nextExp]);
            }
        }
    }

    document.getElementById('expenseForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = 'Se salvează...';
        saveBtn.disabled = true;

        let uploadedFileUrl = existingFileUrl; 
        const fileInput = document.getElementById('fileUpload');
        
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = Date.now() + '.' + fileExt;
            
            const { data: uploadData, error: uploadError } = await supabaseClient.storage.from('facturi').upload(fileName, file);
            
            if (!uploadError) {
                const { data: publicUrlData } = supabaseClient.storage.from('facturi').getPublicUrl(fileName);
                uploadedFileUrl = publicUrlData.publicUrl;
            } else {
                alert("A apărut o eroare la încărcarea facturii în Storage.");
            }
        }
        
        const currentRateVal = document.getElementById('currentRate').value;
        const totalRatesVal = document.getElementById('totalRates').value;

        const exp = {
            month_val: document.getElementById('expenseMonth').value,
            merchant: document.getElementById('merchant').value,
            category: document.getElementById('category').value,
            amount: parseFloat(document.getElementById('amount').value),
            comments: document.getElementById('comments').value,
            is_paid: document.getElementById('isPaid').checked,
            current_rate: currentRateVal ? parseInt(currentRateVal) : null,
            total_rates: totalRatesVal ? parseInt(totalRatesVal) : null,
            file_url: uploadedFileUrl
        };
        
        if (editingExpenseId) {
            const { error } = await supabaseClient.from('cheltuieli').update(exp).eq('id', editingExpenseId);
            if (error) {
                alert("Eroare la actualizarea cheltuielii.");
            } else {
                if (exp.is_paid) {
                    await handleNextRateRollover(exp);
                }
                cancelEdit();
            }
        } else {
            const { error } = await supabaseClient.from('cheltuieli').insert([exp]);
            if (error) {
                alert("Eroare la salvarea cheltuielii.");
            } else {
                if (exp.is_paid) {
                    await handleNextRateRollover(exp);
                }
                const currentMonth = document.getElementById('expenseMonth').value;
                this.reset();
                document.getElementById('expenseMonth').value = currentMonth;
                toggleRateFields();
            }
        }
        
        fetchExpenses();
        saveBtn.disabled = false;
        saveBtn.innerText = 'Salvează';
    });

    function startEdit(id) {
        const exp = expenses.find(e => e.id === id);
        if (!exp) return;
        
        editingExpenseId = id;
        existingFileUrl = exp.file_url;
        
        document.getElementById('formTitle').innerText = 'Editează Cheltuiala';
        document.getElementById('expenseMonth').value = exp.month_val;
        document.getElementById('merchant').value = exp.merchant;
        document.getElementById('category').value = exp.category;
        document.getElementById('amount').value = exp.amount;
        document.getElementById('comments').value = exp.comments || '';
        document.getElementById('isPaid').checked = exp.is_paid;
        
        if (exp.category === '1') {
            document.getElementById('currentRate').value = exp.current_rate || '';
            document.getElementById('totalRates').value = exp.total_rates || '';
        } else {
            document.getElementById('currentRate').value = '';
            document.getElementById('totalRates').value = '';
        }
        
        toggleRateFields();
        
        document.getElementById('saveBtn').innerText = 'Actualizează';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        
        document.getElementById('expenseForm').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() {
        editingExpenseId = null;
        existingFileUrl = null;
        
        document.getElementById('formTitle').innerText = 'Adaugă Cheltuială';
        document.getElementById('expenseForm').reset();
        document.getElementById('expenseMonth').value = new Date().toISOString().slice(0, 7);
        toggleRateFields();
        
        document.getElementById('saveBtn').innerText = 'Salvează';
        document.getElementById('cancelEditBtn').style.display = 'none';
    }

    async function togglePaid(id, currentStatus) {
        const nextStatus = !currentStatus;
        await supabaseClient.from('cheltuieli').update({ is_paid: nextStatus }).eq('id', id);
        
        if (nextStatus) {
            const exp = expenses.find(e => e.id === id);
            if (exp) {
                await handleNextRateRollover(exp);
            }
        }
        
        fetchExpenses();
    }

    async function deleteExpense(id) {
        if(confirm("Sigur vrei să ștergi această înregistrare?")) {
            await supabaseClient.from('cheltuieli').delete().eq('id', id);
            fetchExpenses();
        }
    }

    function renderUI() {
        const tbody = document.getElementById('expenseTableBody');
        tbody.innerHTML = '';
        
        let total = 0;
        let paid = 0;
        const selectedMonth = document.getElementById('expenseMonth').value;

        expenses.forEach(exp => {
            if (exp.month_val === selectedMonth) {
                total += exp.amount;
                if (exp.is_paid) paid += exp.amount;
            }
        });

        document.getElementById('totalAmount').innerText = total.toFixed(2);
        document.getElementById('paidAmount').innerText = paid.toFixed(2);
        document.getElementById('remainingAmount').innerText = (total - paid).toFixed(2);

        const searchVal = document.getElementById('filterSearch').value.toLowerCase();
        const catVal = document.getElementById('filterCategory').value;
        const statusVal = document.getElementById('filterStatus').value;
        const minAmt = parseFloat(document.getElementById('filterMinAmount').value) || 0;
        const maxAmt = parseFloat(document.getElementById('filterMaxAmount').value) || Infinity;
        const monthScope = document.getElementById('filterMonthScope').value;

        const filteredExpenses = expenses.filter(exp => {
            if (monthScope === 'SELECTED' && exp.month_val !== selectedMonth) return false;
            
            if (catVal !== 'ALL' && exp.category !== catVal) return false;
            
            if (statusVal === 'PAID' && !exp.is_paid) return false;
            if (statusVal === 'UNPAID' && exp.is_paid) return false;
            
            if (exp.amount < minAmt || exp.amount > maxAmt) return false;
            
            if (searchVal) {
                const mMatch = exp.merchant ? exp.merchant.toLowerCase().includes(searchVal) : false;
                const cMatch = exp.comments ? exp.comments.toLowerCase().includes(searchVal) : false;
                if (!mMatch && !cMatch) return false;
            }
            
            return true;
        });

        filteredExpenses.forEach(exp => {
            const tr = document.createElement('tr');
            
            let rateBadge = '';
            if (exp.category === '1' && exp.current_rate && exp.total_rates) {
                rateBadge = `<span style="font-size: 0.85em; color: #f39c12; margin-left: 8px;">- Rata ${exp.current_rate} din ${exp.total_rates}</span>`;
            }
            
            let fileLink = '';
            if (exp.file_url) {
                fileLink = `<br><a href="${exp.file_url}" target="_blank" style="color: #3498db; text-decoration: none; font-size: 0.85em;">📄 Vezi Factura / QR</a>`;
            }

            tr.innerHTML = `
                <td>${exp.month_val}</td>
                <td><strong>${exp.merchant}</strong>${rateBadge}${fileLink}</td>
                <td>Cat ${exp.category}</td>
                <td>${exp.amount.toFixed(2)}</td>
                <td style="max-width: 250px; overflow-wrap: break-word; word-break: break-word; white-space: normal;">${exp.comments || ''}</td>
                <td>
                    <input type="checkbox" ${exp.is_paid ? 'checked' : ''} onchange="togglePaid(${exp.id}, ${exp.is_paid})">
                    ${exp.is_paid ? 'Da' : 'Nu'}
                </td>
                <td>
                    <button style="background-color: #2980b9; padding: 5px 10px; font-size:0.9em; margin-right: 5px;" onclick="startEdit(${exp.id})">Editează</button>
                    <button style="background-color: #e74c3c; padding: 5px 10px; font-size:0.9em;" onclick="deleteExpense(${exp.id})">Șterge</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        updateChart();
    }

    document.getElementById('expenseMonth').addEventListener('change', renderUI);

    function updateChart() {
        const monthsToAnalyze = parseInt(document.getElementById('chartMonths').value) || 6;
        const allMonths = [...new Set(expenses.map(e => e.month_val))].sort().slice(-monthsToAnalyze);
        const cat1Data = []; const cat2Data = []; const cat3Data = [];

        allMonths.forEach(m => {
            const mExp = expenses.filter(e => e.month_val === m);
            cat1Data.push(mExp.filter(e => e.category === "1").reduce((s, e) => s + e.amount, 0));
            cat2Data.push(mExp.filter(e => e.category === "2").reduce((s, e) => s + e.amount, 0));
            cat3Data.push(mExp.filter(e => e.category === "3").reduce((s, e) => s + e.amount, 0));
        });

        const ctx = document.getElementById('expenseChart').getContext('2d');
        if (expenseChartInstance) expenseChartInstance.destroy();

        expenseChartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: allMonths,
                datasets: [
                    { label: 'Fixe', data: cat1Data, backgroundColor: '#34495e' },
                    { label: 'Variabile', data: cat2Data, backgroundColor: '#f1c40f' },
                    { label: 'Neprevăzute', data: cat3Data, backgroundColor: '#e74c3c' }
                ]
            },
            options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true } } }
        });
    }
</script>
</body>
</html>
